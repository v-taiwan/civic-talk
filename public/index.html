<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Civic Talk｜公共議題審議平台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <div class="header-inner">
      <div class="logo">🗣️ <span>Civic</span>Talk</div>
      <nav class="header-nav">
        <a href="index.html">所有議題</a>
        <a href="#" id="btn-new-issue" class="btn btn-primary btn-sm">＋ 新增議題</a>
      </nav>
    </div>
  </header>

  <main>
    <div class="container">
      <h1 class="page-title">公共議題討論平台</h1>
      <p class="page-subtitle">用 AI 降低參與門檻，讓更多人真正了解議題全貌，而不只是選邊站。</p>

      <!-- New issue form (hidden by default) -->
      <div id="new-issue-form" class="card" style="display:none; margin-bottom:24px;">
        <h2 class="font-bold mb-16">建立新議題</h2>
        <div class="form-group">
          <label>議題標題 <span class="label-hint">用一句話說清楚</span></label>
          <input type="text" id="new-title" placeholder="例：居住正義與囤房稅改革方向">
        </div>
        <div class="form-group">
          <label>議題簡介 <span class="label-hint">100字以內，說明議題背景</span></label>
          <textarea id="new-desc" rows="3" placeholder="說明這個議題的來龍去脈，以及為什麼值得關注…"></textarea>
        </div>
        <div class="flex gap-8">
          <button class="btn btn-primary" onclick="createIssue()">建立議題</button>
          <button class="btn btn-secondary" onclick="toggleNewForm(false)">取消</button>
        </div>
      </div>

      <!-- Issue list -->
      <div id="issue-list">
        <div class="empty"><div class="empty-icon">⏳</div>載入中…</div>
      </div>
    </div>
  </main>

  <div id="toast"></div>

  <script>
    const API = '/api';

    async function loadIssues() {
      const res = await fetch(`${API}/issues`);
      const issues = await res.json();
      const el = document.getElementById('issue-list');
      if (!issues.length) {
        el.innerHTML = `<div class="empty"><div class="empty-icon">📭</div>還沒有議題，成為第一個建立者吧！</div>`;
        return;
      }
      el.innerHTML = issues.map(issue => `
        <a href="issue.html?id=${issue.id}" class="card issue-card">
          <div class="issue-title">${esc(issue.title)}</div>
          <p class="text-muted text-sm mt-4" style="margin-bottom:12px;">${esc(issue.description || '')}</p>
          <div class="issue-meta">
            <span class="status-badge status-${issue.status}">${statusLabel(issue.status)}</span>
            <span>📄 ${issue.material_count} 份素材</span>
            <span>${formatDate(issue.created_at)}</span>
          </div>
        </a>
      `).join('');
    }

    function statusLabel(s) {
      return { collecting: '素材收集中', summarizing: '彙整中', published: '說明頁已發布' }[s] || s;
    }

    function toggleNewForm(show) {
      document.getElementById('new-issue-form').style.display = show ? 'block' : 'none';
    }

    async function createIssue() {
      const title = document.getElementById('new-title').value.trim();
      const description = document.getElementById('new-desc').value.trim();
      if (!title) { showToast('請填寫議題標題'); return; }
      const res = await fetch(`${API}/issues`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description })
      });
      if (res.ok) {
        const data = await res.json();
        showToast('議題建立成功！');
        toggleNewForm(false);
        setTimeout(() => location.href = `issue.html?id=${data.id}`, 800);
      } else {
        showToast('建立失敗，請再試一次');
      }
    }

    document.getElementById('btn-new-issue').onclick = (e) => {
      e.preventDefault();
      toggleNewForm(true);
      document.getElementById('new-title').focus();
    };

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }
    function formatDate(d) {
      return d ? new Date(d).toLocaleDateString('zh-TW') : '';
    }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    loadIssues();
  </script>
</body>
</html>
