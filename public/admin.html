<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理後台｜Civic Talk</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap">
  <link rel="stylesheet" href="style.css">
  <style>
    .admin-header { background: #1a1a1a; color: white; padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; }
    .admin-logo { font-size: 1rem; font-weight: 700; }
    .admin-badge { background: #dc2626; color: white; padding: 2px 8px; border-radius: 4px; font-size: 0.75rem; margin-left: 8px; }
    .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
    .stat-card { background: white; border: 1px solid var(--border); border-radius: 8px; padding: 20px; text-align: center; }
    .stat-num { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .stat-label { font-size: 0.85rem; color: var(--text-muted); margin-top: 4px; }
    .admin-table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
    .admin-table th { text-align: left; padding: 10px 12px; background: #f5f5f3; border-bottom: 2px solid var(--border); font-weight: 600; font-size: 0.82rem; color: var(--text-muted); }
    .admin-table td { padding: 10px 12px; border-bottom: 1px solid var(--border); vertical-align: top; }
    .admin-table tr:hover td { background: #fafaf8; }
    .btn-danger { background: #fef2f2; color: #dc2626; border-color: #fecaca; }
    .btn-danger:hover { background: #fee2e2; }
    .btn-edit { background: #eff6ff; color: var(--accent); border-color: #bfdbfe; }
    .btn-edit:hover { background: #dbeafe; }
    #login-screen { max-width: 400px; margin: 120px auto; }
    .login-card { text-align: center; }
    .login-card h1 { font-size: 1.5rem; margin-bottom: 8px; }
    .login-card p { color: var(--text-muted); margin-bottom: 24px; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; align-items: center; justify-content: center; z-index: 100; }
    .modal { background: white; border-radius: 10px; padding: 28px; width: 100%; max-width: 560px; max-height: 80vh; overflow-y: auto; }
    .modal h2 { font-size: 1.1rem; margin-bottom: 20px; }
    .truncate { max-width: 280px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .issue-row-actions { display: flex; gap: 6px; flex-wrap: wrap; }
    @media (max-width: 700px) { .stat-grid { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>
  <!-- Login -->
  <div id="login-screen">
    <div class="card login-card">
      <div style="font-size:2rem;margin-bottom:12px;">🔐</div>
      <h1>管理後台</h1>
      <p>請輸入管理密碼登入</p>
      <div class="form-group">
        <input type="password" id="pwd-input" placeholder="管理密碼" style="text-align:center;">
      </div>
      <button class="btn btn-primary" style="width:100%;" onclick="login()">登入</button>
      <p id="login-err" style="color:#dc2626;margin-top:12px;display:none;">密碼錯誤，請再試一次</p>
    </div>
  </div>

  <!-- Admin UI (hidden until login) -->
  <div id="admin-ui" style="display:none;">
    <div class="admin-header">
      <div class="admin-logo">🗣️ Civic Talk <span class="admin-badge">管理後台</span></div>
      <div style="display:flex;gap:12px;align-items:center;">
        <a href="index.html" style="color:#9ca3af;font-size:0.85rem;">← 回前台</a>
        <button class="btn btn-ghost btn-sm" style="color:#9ca3af;" onclick="logout()">登出</button>
      </div>
    </div>

    <main style="max-width:1000px;margin:0 auto;padding:32px 20px;">

      <!-- Stats -->
      <div class="stat-grid" id="stats-grid">
        <div class="stat-card"><div class="stat-num">…</div><div class="stat-label">議題</div></div>
        <div class="stat-card"><div class="stat-num">…</div><div class="stat-label">素材</div></div>
        <div class="stat-card"><div class="stat-num">…</div><div class="stat-label">民眾意見</div></div>
        <div class="stat-card"><div class="stat-num">…</div><div class="stat-label">說明頁版本</div></div>
      </div>

      <!-- Tabs -->
      <div class="tabs">
        <button class="tab active" onclick="switchTab('issues')">📋 議題管理</button>
        <button class="tab" onclick="switchTab('materials')">📚 素材管理</button>
        <button class="tab" onclick="switchTab('opinions')">💬 意見管理</button>
      </div>

      <!-- Tab: Issues -->
      <div id="tab-issues" class="tab-panel active">
        <div class="flex justify-between items-center mb-16">
          <h2 class="font-bold">所有議題</h2>
          <button class="btn btn-primary btn-sm" onclick="openNewIssue()">＋ 新增議題</button>
        </div>
        <div style="overflow-x:auto;">
          <table class="admin-table" id="issues-table">
            <thead>
              <tr>
                <th>ID</th><th>標題</th><th>狀態</th><th>素材數</th><th>建立時間</th><th>操作</th>
              </tr>
            </thead>
            <tbody id="issues-tbody"><tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:32px;">載入中…</td></tr></tbody>
          </table>
        </div>
      </div>

      <!-- Tab: Materials -->
      <div id="tab-materials" class="tab-panel">
        <h2 class="font-bold mb-16">素材管理</h2>
        <div class="form-group" style="max-width:360px;">
          <label>選擇議題</label>
          <select id="mat-issue-select" onchange="loadMaterials()">
            <option value="">請選擇議題…</option>
          </select>
        </div>
        <div id="materials-content"><div class="empty"><div class="empty-icon">👆</div>請先選擇議題</div></div>
      </div>

      <!-- Tab: Opinions -->
      <div id="tab-opinions" class="tab-panel">
        <h2 class="font-bold mb-16">意見管理</h2>
        <div class="form-group" style="max-width:360px;">
          <label>選擇議題</label>
          <select id="op-issue-select" onchange="loadOpinions()">
            <option value="">請選擇議題…</option>
          </select>
        </div>
        <div id="opinions-content"><div class="empty"><div class="empty-icon">👆</div>請先選擇議題</div></div>
      </div>

    </main>
  </div>

  <!-- Edit Issue Modal -->
  <div id="modal-edit" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>編輯議題</h2>
      <input type="hidden" id="edit-id">
      <div class="form-group">
        <label>標題</label>
        <input type="text" id="edit-title">
      </div>
      <div class="form-group">
        <label>簡介</label>
        <textarea id="edit-desc" rows="3"></textarea>
      </div>
      <div class="form-group">
        <label>狀態</label>
        <select id="edit-status">
          <option value="collecting">素材收集中</option>
          <option value="summarizing">彙整中</option>
          <option value="published">說明頁已發布</option>
        </select>
      </div>
      <div class="form-group">
        <label>polis.tw 對話 ID <span style="font-weight:400;color:var(--text-muted);font-size:0.82rem;">（選填，填入後前台會顯示投票嵌入）</span></label>
        <input type="text" id="edit-polis" placeholder="例如：3hdpvkky7k">
      </div>
      <div class="flex gap-8 mt-16">
        <button class="btn btn-primary" onclick="saveIssue()">儲存</button>
        <button class="btn btn-secondary" onclick="closeModal('modal-edit')">取消</button>
      </div>
    </div>
  </div>

  <!-- New Issue Modal -->
  <div id="modal-new" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>新增議題</h2>
      <div class="form-group">
        <label>標題</label>
        <input type="text" id="new-title" placeholder="議題標題">
      </div>
      <div class="form-group">
        <label>簡介</label>
        <textarea id="new-desc" rows="3" placeholder="議題背景說明…"></textarea>
      </div>
      <div class="form-group">
        <label>polis.tw 對話 ID <span style="font-weight:400;color:var(--text-muted);font-size:0.82rem;">（選填，可之後在編輯議題中填入）</span></label>
        <input type="text" id="new-polis" placeholder="例如：3hdpvkky7k">
      </div>
      <div class="flex gap-8 mt-16">
        <button class="btn btn-primary" onclick="createIssue()">建立</button>
        <button class="btn btn-secondary" onclick="closeModal('modal-new')">取消</button>
      </div>
    </div>
  </div>

  <!-- Edit Briefing Modal -->
  <div id="modal-briefing" class="modal-overlay" style="display:none;">
    <div class="modal">
      <h2>編輯說明頁</h2>
      <input type="hidden" id="briefing-issue-id">
      <div class="form-group"><label>共識</label><textarea id="b-consensus" rows="3"></textarea></div>
      <div class="form-group"><label>爭點</label><textarea id="b-disputes" rows="3"></textarea></div>
      <div class="form-group"><label>立場地圖</label><textarea id="b-positions" rows="4"></textarea></div>
      <div class="form-group"><label>一頁式說明</label><textarea id="b-narrative" rows="6"></textarea></div>
      <div class="flex gap-8 mt-16">
        <button class="btn btn-primary" onclick="saveBriefing()">儲存</button>
        <button class="btn btn-secondary" onclick="closeModal('modal-briefing')">取消</button>
      </div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    const API = '/api';
    let adminToken = '';
    let allIssues = [];

    // ── Auth ────────────────────────────────────────────────
    async function login() {
      const pwd = document.getElementById('pwd-input').value;
      const res = await fetch(`${API}/admin/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      });
      const data = await res.json();
      if (data.ok) {
        adminToken = pwd;
        sessionStorage.setItem('civic_admin_token', pwd);
        showAdmin();
      } else {
        document.getElementById('login-err').style.display = 'block';
      }
    }

    function logout() {
      sessionStorage.removeItem('civic_admin_token');
      location.reload();
    }

    function authHeaders() {
      return { 'Content-Type': 'application/json', 'X-Admin-Token': adminToken };
    }

    // ── Init ────────────────────────────────────────────────
    window.addEventListener('load', () => {
      const saved = sessionStorage.getItem('civic_admin_token');
      if (saved) { adminToken = saved; showAdmin(); }
      document.getElementById('pwd-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });
    });

    async function showAdmin() {
      document.getElementById('login-screen').style.display = 'none';
      document.getElementById('admin-ui').style.display = 'block';
      await Promise.all([loadStats(), loadIssuesTable()]);
    }

    // ── Stats ───────────────────────────────────────────────
    async function loadStats() {
      const res = await fetch(`${API}/admin/stats`, { headers: authHeaders() });
      const data = await res.json();
      const grid = document.getElementById('stats-grid');
      grid.innerHTML = `
        <div class="stat-card"><div class="stat-num">${data.issues}</div><div class="stat-label">議題</div></div>
        <div class="stat-card"><div class="stat-num">${data.materials}</div><div class="stat-label">素材</div></div>
        <div class="stat-card"><div class="stat-num">${data.opinions}</div><div class="stat-label">民眾意見</div></div>
        <div class="stat-card"><div class="stat-num">${data.briefings}</div><div class="stat-label">說明頁版本</div></div>
      `;
    }

    // ── Issues ──────────────────────────────────────────────
    async function loadIssuesTable() {
      const res = await fetch(`${API}/issues`);
      allIssues = await res.json();

      // populate selects
      ['mat-issue-select','op-issue-select'].forEach(id => {
        const sel = document.getElementById(id);
        const cur = sel.value;
        sel.innerHTML = '<option value="">請選擇議題…</option>' +
          allIssues.map(i => `<option value="${i.id}">${esc(i.title)}</option>`).join('');
        if (cur) sel.value = cur;
      });

      const statusMap = { collecting: '素材收集中', summarizing: '彙整中', published: '已發布' };
      const tbody = document.getElementById('issues-tbody');
      if (!allIssues.length) {
        tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:#9ca3af;padding:32px;">尚無議題</td></tr>';
        return;
      }
      tbody.innerHTML = allIssues.map(i => `
        <tr>
          <td style="color:#9ca3af;">#${i.id}</td>
          <td><div class="truncate" title="${esc(i.title)}">${esc(i.title)}</div></td>
          <td><span class="status-badge status-${i.status}">${statusMap[i.status]||i.status}</span></td>
          <td>${i.material_count}</td>
          <td style="color:#9ca3af;font-size:0.8rem;">${formatDate(i.created_at)}</td>
          <td>
            <div class="issue-row-actions">
              <button class="btn btn-edit btn-sm" onclick="openEditIssue(${i.id})">編輯</button>
              <button class="btn btn-edit btn-sm" onclick="openBriefing(${i.id})">說明頁</button>
              <button class="btn btn-danger btn-sm" onclick="deleteIssue(${i.id}, '${esc(i.title)}')">刪除</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    function openNewIssue() { document.getElementById('modal-new').style.display = 'flex'; }

    async function createIssue() {
      const title = document.getElementById('new-title').value.trim();
      const description = document.getElementById('new-desc').value.trim();
      const polis_id = document.getElementById('new-polis').value.trim() || null;
      if (!title) { showToast('請填寫標題'); return; }
      const res = await fetch(`${API}/issues`, {
        method: 'POST', headers: authHeaders(), body: JSON.stringify({ title, description, polis_id })
      });
      if (res.ok) {
        closeModal('modal-new');
        document.getElementById('new-title').value = '';
        document.getElementById('new-desc').value = '';
        document.getElementById('new-polis').value = '';
        showToast('✅ 議題建立成功');
        loadIssuesTable(); loadStats();
      }
    }

    async function openEditIssue(id) {
      const issue = allIssues.find(i => i.id === id);
      if (!issue) return;
      document.getElementById('edit-id').value = id;
      document.getElementById('edit-title').value = issue.title;
      document.getElementById('edit-desc').value = issue.description || '';
      document.getElementById('edit-status').value = issue.status;
      document.getElementById('edit-polis').value = issue.polis_id || '';
      document.getElementById('modal-edit').style.display = 'flex';
    }

    async function saveIssue() {
      const id = document.getElementById('edit-id').value;
      const body = {
        title: document.getElementById('edit-title').value.trim(),
        description: document.getElementById('edit-desc').value.trim(),
        status: document.getElementById('edit-status').value,
        polis_id: document.getElementById('edit-polis').value.trim() || null,
      };
      const res = await fetch(`${API}/issues/${id}`, { method: 'PUT', headers: authHeaders(), body: JSON.stringify(body) });
      if (res.ok) { closeModal('modal-edit'); showToast('✅ 已儲存'); loadIssuesTable(); }
    }

    async function deleteIssue(id, title) {
      if (!confirm(`確定要刪除「${title}」及其所有素材、意見、說明頁嗎？此操作無法復原。`)) return;
      const res = await fetch(`${API}/issues/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) { showToast('✅ 已刪除'); loadIssuesTable(); loadStats(); }
    }

    // ── Briefing ────────────────────────────────────────────
    async function openBriefing(issueId) {
      const res = await fetch(`${API}/issues/${issueId}/briefing`);
      const b = await res.json();
      document.getElementById('briefing-issue-id').value = issueId;
      document.getElementById('b-consensus').value = b?.consensus || '';
      document.getElementById('b-disputes').value = b?.disputes || '';
      document.getElementById('b-positions').value = b?.positions || '';
      document.getElementById('b-narrative').value = b?.narrative || '';
      document.getElementById('modal-briefing').style.display = 'flex';
    }

    async function saveBriefing() {
      const id = document.getElementById('briefing-issue-id').value;
      const existing = await (await fetch(`${API}/issues/${id}/briefing`)).json();
      const body = {
        consensus: document.getElementById('b-consensus').value,
        disputes: document.getElementById('b-disputes').value,
        positions: document.getElementById('b-positions').value,
        narrative: document.getElementById('b-narrative').value,
      };
      // If briefing exists, update; otherwise create
      const method = existing ? 'PUT' : 'POST';
      const url = existing ? `${API}/issues/${id}/briefing` : `${API}/issues/${id}/briefing`;
      const res = await fetch(url, { method, headers: authHeaders(), body: JSON.stringify(body) });
      if (res.ok) { closeModal('modal-briefing'); showToast('✅ 說明頁已儲存'); }
    }

    // ── Materials ───────────────────────────────────────────
    async function loadMaterials() {
      const issueId = document.getElementById('mat-issue-select').value;
      if (!issueId) return;
      const res = await fetch(`${API}/issues/${issueId}/materials`);
      const mats = await res.json();
      const el = document.getElementById('materials-content');
      if (!mats.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">📭</div>尚無素材</div>'; return; }
      const stanceLabel = { pro:'支持', con:'反對', neutral:'中立', unknown:'不明' };
      el.innerHTML = `<p class="text-sm text-muted mb-16">共 ${mats.length} 份素材</p>` + mats.map(m => `
        <div class="card" style="margin-bottom:12px;">
          <div class="flex justify-between items-center mb-8">
            <span class="font-medium">${esc(m.source_name || '未知來源')}</span>
            <div class="flex gap-8 items-center">
              <span class="text-sm text-muted">${stanceLabel[m.stance]||m.stance}</span>
              <button class="btn btn-danger btn-sm" onclick="deleteMaterial(${m.id})">刪除</button>
            </div>
          </div>
          <div style="font-size:0.85rem;color:#6b6b6b;white-space:pre-wrap;max-height:120px;overflow:hidden;">${esc(m.content.slice(0,300))}${m.content.length>300?'…':''}</div>
          ${m.source_url ? `<a href="${esc(m.source_url)}" target="_blank" class="text-sm" style="margin-top:6px;display:block;">🔗 原始連結</a>` : ''}
        </div>
      `).join('');
    }

    async function deleteMaterial(id) {
      if (!confirm('確定要刪除這份素材嗎？')) return;
      const res = await fetch(`${API}/materials/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) { showToast('✅ 已刪除'); loadMaterials(); loadStats(); }
    }

    // ── Opinions ────────────────────────────────────────────
    async function loadOpinions() {
      const issueId = document.getElementById('op-issue-select').value;
      if (!issueId) return;
      const res = await fetch(`${API}/issues/${issueId}/opinions`);
      const ops = await res.json();
      const el = document.getElementById('opinions-content');
      if (!ops.length) { el.innerHTML = '<div class="empty"><div class="empty-icon">💬</div>尚無意見</div>'; return; }
      el.innerHTML = `<p class="text-sm text-muted mb-16">共 ${ops.length} 份意見</p>` + ops.map(o => `
        <div class="card opinion-card mb-16">
          <div class="flex justify-between items-center mb-8">
            <span class="opinion-meta">${formatDate(o.created_at)}</span>
            <button class="btn btn-danger btn-sm" onclick="deleteOpinion(${o.id})">刪除</button>
          </div>
          <div style="font-size:0.9rem;white-space:pre-wrap;">${esc(o.summary)}</div>
        </div>
      `).join('');
    }

    async function deleteOpinion(id) {
      if (!confirm('確定要刪除這份意見嗎？')) return;
      const res = await fetch(`${API}/opinions/${id}`, { method: 'DELETE', headers: authHeaders() });
      if (res.ok) { showToast('✅ 已刪除'); loadOpinions(); loadStats(); }
    }

    // ── Tabs ────────────────────────────────────────────────
    function switchTab(name) {
      const names = ['issues','materials','opinions'];
      document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', names[i]===name));
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.getElementById(`tab-${name}`).classList.add('active');
    }

    // ── Util ────────────────────────────────────────────────
    function closeModal(id) { document.getElementById(id).style.display = 'none'; }
    function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
    function formatDate(d) { return d ? new Date(d).toLocaleDateString('zh-TW') : ''; }
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2500);
    }

    // Close modal on overlay click
    document.querySelectorAll('.modal-overlay').forEach(el => {
      el.addEventListener('click', e => { if (e.target === el) el.style.display = 'none'; });
    });
  </script>
</body>
</html>
