name = "civic-talk"
compatibility_date = "2024-01-01"
pages_build_output_dir = "public"

# 部署後到 Cloudflare Pages 設定頁面新增 D1 binding：
#   Settings → Functions → D1 database bindings
#   Variable name: DB
#   Database: civic-talk-db

[[d1_databases]]
binding = "DB"
database_name = "civic-talk-db"
database_id = "YOUR_D1_DATABASE_ID"
