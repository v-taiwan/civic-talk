name = "civic-talk"
main = "worker/index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "civic-talk-db"
database_id = "YOUR_D1_DATABASE_ID"   # replace after: wrangler d1 create civic-talk-db

[site]
bucket = "./public"
